<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-bright": "#fafaf5",
                    "error": "#ba1a1a",
                    "on-secondary-fixed-variant": "#5d4201",
                    "on-primary-fixed": "#1c1b1b",
                    "surface-container-highest": "#e3e3de",
                    "on-primary-fixed-variant": "#474746",
                    "background": "#fafaf5",
                    "tertiary-container": "#0d1a38",
                    "primary-fixed-dim": "#c8c6c5",
                    "on-error": "#ffffff",
                    "secondary-fixed": "#ffdea5",
                    "on-surface": "#1a1c19",
                    "primary": "#000000",
                    "on-primary-container": "#858383",
                    "on-tertiary-container": "#7783a6",
                    "primary-fixed": "#e5e2e1",
                    "outline": "#747878",
                    "on-secondary": "#ffffff",
                    "tertiary": "#000000",
                    "on-tertiary-fixed-variant": "#3a4666",
                    "tertiary-fixed-dim": "#bac6ec",
                    "inverse-primary": "#c8c6c5",
                    "inverse-on-surface": "#f1f1ec",
                    "secondary-container": "#fed488",
                    "secondary": "#775a19",
                    "on-tertiary": "#ffffff",
                    "on-error-container": "#93000a",
                    "error-container": "#ffdad6",
                    "inverse-surface": "#2f312e",
                    "secondary-fixed-dim": "#e9c176",
                    "tertiary-fixed": "#dae2ff",
                    "surface-dim": "#dadad5",
                    "on-secondary-fixed": "#261900",
                    "surface-tint": "#5f5e5e",
                    "surface-container-high": "#e8e8e3",
                    "primary-container": "#1c1b1b",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-container": "#785a1a",
                    "surface-variant": "#e3e3de",
                    "outline-variant": "#c4c7c7",
                    "on-primary": "#ffffff",
                    "surface": "#fafaf5",
                    "on-tertiary-fixed": "#0d1a38",
                    "surface-container": "#eeeee9",
                    "surface-container-low": "#f4f4ef",
                    "on-background": "#1a1c19",
                    "on-surface-variant": "#444748"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Newsreader"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        }
      }
    </script>
<style>
        .glass-panel {
            background: rgba(250, 250, 245, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .scanning-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #775a19, transparent);
            box-shadow: 0 0 15px #775a19;
            position: absolute;
            width: 100%;
            top: 50%;
        }
        .viewfinder-corner {
            width: 40px;
            height: 40px;
            border-color: rgba(255, 255, 255, 0.5);
            position: absolute;
        }
        .corner-tl { top: 40px; left: 40px; border-top-width: 2px; border-left-width: 2px; border-radius: 1rem 0 0 0; }
        .corner-tr { top: 40px; right: 40px; border-top-width: 2px; border-right-width: 2px; border-radius: 0 1rem 0 0; }
        .corner-bl { bottom: 40px; left: 40px; border-bottom-width: 2px; border-left-width: 2px; border-radius: 0 0 0 1rem; }
        .corner-br { bottom: 40px; right: 40px; border-bottom-width: 2px; border-right-width: 2px; border-radius: 0 0 1rem 0; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface overflow-hidden h-screen w-screen">
<!-- Top App Bar (Shared Component Strategy) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 glass-panel">
<div class="flex items-center gap-4">
<button class="p-2 text-on-surface hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-headline italic text-2xl tracking-widest text-black">ATELIER</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-stone-500">flash_off</span>
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Close up portrait of a stylish woman with soft lighting and minimalist background for user profile" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDiBJujzJJsjyJr1WOHuBFksYemyAoftKyZ-ZM_jyDsKXE9g10GBEWkcZe2w61cjI-EmIZYJkICqcBl2QkLyYrnYMlhwGd2MKbz7N9f8x8E2-a79VuQ2cG6F3YeQj2l8a4JXtGwENAaH1ry2TfxMxdcXBNk3D3qGlExwFtTUnONyXGcfKPAGOvcTGykbcfQadRnO4wAe6fdxvOU00Mikqyeyac6UYzORXTuTfS0QKpzuaQnb8XCfSKqPgJUeq9bXAi1QzkPIa0TY6U"/>
</div>
</div>
</header>
<!-- Main Camera Canvas -->
<main class="relative h-screen w-full bg-black overflow-hidden">
<!-- Live Viewfinder Image Background -->
<div class="absolute inset-0 w-full h-full overflow-hidden">
<img alt="Garment Scan View" class="w-full h-full object-cover opacity-90" data-alt="High-end studio shot of a textured beige linen shirt draped on a minimalist wooden chair, soft side lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD5Newi0y1OHS-gSQ-mbs8tArU-mCqNdtB1P3BJfNtqbEuNJU_vkTQlDKqE5Kb56xpoJGD3yog5ckumWQ6SKT2K0DBQXKW-9OTae-tdUTdwgMn6nY_DLNLy6AdX5sjvkIQnjtSRbNABO2ifGfWDxIyhQM8nzSyp7u0qAnIihkLBrTU5flvkxavWK-PJY_wW_lAz-AdMTl6QF-dqGplYa514btZhrMRq5smwEM6SetcD7901rbnYqBBPiOA51dkNE5Cpv3UfYvHtNpc"/>
</div>
<!-- Viewfinder UI Elements -->
<div class="absolute inset-0 pointer-events-none">
<div class="viewfinder-corner corner-tl"></div>
<div class="viewfinder-corner corner-tr"></div>
<div class="viewfinder-corner corner-bl"></div>
<div class="viewfinder-corner corner-br"></div>
<div class="scanning-line"></div>
</div>
<!-- Floating Smart Tags -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<!-- Asymmetrical Tag Layout -->
<div class="absolute top-[35%] left-[25%] px-4 py-2 glass-panel rounded-full flex items-center gap-2 border border-white/10 shadow-lg animate-pulse">
<span class="material-symbols-outlined text-[14px] text-secondary">flare</span>
<span class="text-[10px] font-label uppercase tracking-[0.05rem]">Linen</span>
</div>
<div class="absolute top-[45%] right-[20%] px-4 py-2 glass-panel rounded-full flex items-center gap-2 border border-white/10 shadow-lg">
<span class="material-symbols-outlined text-[14px] text-secondary">palette</span>
<span class="text-[10px] font-label uppercase tracking-[0.05rem]">Beige</span>
</div>
<div class="absolute bottom-[35%] left-[30%] px-4 py-2 glass-panel rounded-full flex items-center gap-2 border border-white/10 shadow-lg">
<span class="material-symbols-outlined text-[14px] text-secondary">straighten</span>
<span class="text-[10px] font-label uppercase tracking-[0.05rem]">Slim Fit</span>
</div>
<div class="absolute bottom-[42%] right-[32%] px-4 py-2 glass-panel rounded-full flex items-center gap-2 border border-white/10 shadow-lg">
<span class="material-symbols-outlined text-[14px] text-secondary">style</span>
<span class="text-[10px] font-label uppercase tracking-[0.05rem]">Minimalist</span>
</div>
</div>
<!-- Status & Actions Overlay -->
<div class="absolute bottom-32 left-0 w-full flex flex-col items-center gap-8 px-8">
<div class="glass-panel px-6 py-2 rounded-full border border-white/10">
<p class="text-[11px] font-label uppercase tracking-[0.1rem] text-on-surface flex items-center gap-3">
<span class="w-1.5 h-1.5 rounded-full bg-secondary animate-ping"></span>
                    Detecting...
                </p>
</div>
<div class="flex items-center justify-between w-full max-w-sm">
<!-- Gallery Button -->
<button class="w-12 h-12 rounded-full glass-panel flex items-center justify-center hover:scale-105 active:scale-95 transition-transform border border-white/10">
<span class="material-symbols-outlined text-on-surface">photo_library</span>
</button>
<!-- Main Capture Button -->
<button class="group relative w-20 h-20 flex items-center justify-center">
<div class="absolute inset-0 border-2 border-white/30 rounded-full group-hover:scale-110 transition-transform duration-300"></div>
<div class="w-16 h-16 bg-white/90 backdrop-blur-md rounded-full shadow-2xl flex items-center justify-center group-active:scale-90 transition-transform">
<span class="material-symbols-outlined text-black text-3xl" style="font-variation-settings: 'FILL' 1;">add_a_photo</span>
</div>
</button>
<!-- Lens Selection -->
<button class="w-12 h-12 rounded-full glass-panel flex items-center justify-center hover:scale-105 active:scale-95 transition-transform border border-white/10">
<span class="material-symbols-outlined text-on-surface">cached</span>
</button>
</div>
</div>
</main>
<!-- Bottom Navigation Bar (Contextually Hidden/Simplified for Focused Task) -->
<!-- Rule: We suppress the main nav shell for this task-focused Add Flow -->
<div class="fixed bottom-0 w-full flex justify-center pb-8 z-50 pointer-events-none">
<div class="bg-stone-50/70 dark:bg-stone-950/70 backdrop-blur-2xl px-8 py-4 rounded-full shadow-[0_8px_32px_0_rgba(26,28,25,0.06)] border border-white/10 pointer-events-auto">
<div class="flex gap-12">
<div class="flex flex-col items-center gap-1 opacity-50">
<span class="material-symbols-outlined text-on-surface">auto_awesome</span>
<span class="text-[9px] font-label uppercase tracking-widest text-on-surface">Style</span>
</div>
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-on-surface" style="font-variation-settings: 'FILL' 1;">add_a_photo</span>
<span class="text-[9px] font-label uppercase tracking-widest text-on-surface font-bold">Add</span>
</div>
<div class="flex flex-col items-center gap-1 opacity-50">
<span class="material-symbols-outlined text-on-surface">checkroom</span>
<span class="text-[9px] font-label uppercase tracking-widest text-on-surface">Closet</span>
</div>
</div>
</div>
</div>
</body></html>
