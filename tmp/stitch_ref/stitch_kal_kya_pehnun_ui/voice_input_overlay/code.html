<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,700;1,6..72,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-bright": "#fafaf5",
                        "error": "#ba1a1a",
                        "on-secondary-fixed-variant": "#5d4201",
                        "on-primary-fixed": "#1c1b1b",
                        "surface-container-highest": "#e3e3de",
                        "on-primary-fixed-variant": "#474746",
                        "background": "#fafaf5",
                        "tertiary-container": "#0d1a38",
                        "primary-fixed-dim": "#c8c6c5",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#ffdea5",
                        "on-surface": "#1a1c19",
                        "primary": "#000000",
                        "on-primary-container": "#858383",
                        "on-tertiary-container": "#7783a6",
                        "primary-fixed": "#e5e2e1",
                        "outline": "#747878",
                        "on-secondary": "#ffffff",
                        "tertiary": "#000000",
                        "on-tertiary-fixed-variant": "#3a4666",
                        "tertiary-fixed-dim": "#bac6ec",
                        "inverse-primary": "#c8c6c5",
                        "inverse-on-surface": "#f1f1ec",
                        "secondary-container": "#fed488",
                        "secondary": "#775a19",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "error-container": "#ffdad6",
                        "inverse-surface": "#2f312e",
                        "secondary-fixed-dim": "#e9c176",
                        "tertiary-fixed": "#dae2ff",
                        "surface-dim": "#dadad5",
                        "on-secondary-fixed": "#261900",
                        "surface-tint": "#5f5e5e",
                        "surface-container-high": "#e8e8e3",
                        "primary-container": "#1c1b1b",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-container": "#785a1a",
                        "surface-variant": "#e3e3de",
                        "outline-variant": "#c4c7c7",
                        "on-primary": "#ffffff",
                        "surface": "#fafaf5",
                        "on-tertiary-fixed": "#0d1a38",
                        "surface-container": "#eeeee9",
                        "surface-container-low": "#f4f4ef",
                        "on-background": "#1a1c19",
                        "on-surface-variant": "#444748"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Newsreader"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .liquid-orb {
            background: linear-gradient(135deg, #1c1b1b 0%, #000000 100%);
            box-shadow: 0 0 80px 20px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }
        .liquid-orb::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255,222,165,0.1) 0%, transparent 70%);
            animation: rotate 8s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .waveform-bar {
            animation: pulse 1.2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { height: 20px; opacity: 0.5; }
            50% { height: 60px; opacity: 1; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased overflow-hidden">
<!-- Background Content (Simulated Main Screen) -->
<main class="min-h-screen p-8 pt-24 space-y-12 blur-md scale-95 transition-all duration-700">
<header class="space-y-2">
<h1 class="font-headline text-5xl italic tracking-tight">Morning, Julian.</h1>
<p class="text-on-surface-variant max-w-xs">The weather in Paris is crisp. Ready to assemble your look?</p>
</header>
<section class="grid grid-cols-2 gap-4">
<div class="aspect-[3/4] rounded-lg bg-surface-container-low overflow-hidden">
<img class="w-full h-full object-cover" data-alt="high-end white linen shirt hanging against a minimal cream wall with soft morning shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCiIW80rJHEGIlgc6peQTGVPVEo_FEYnoBalg4qZGVruqjK7ry0Wa7oiN2YrQ4zAG7Ru3fDIW5J8O8mktLVzb_F_BA8JAwMZHjEv59rhg7o136bS3Shq8aCR1xI8_8GaDQadyL5jIoV_5V6Tl1PMFca0cwQMcRbQl-zyx6ZGhgIZEMukRdhpvn3mZlRNbXXBJ6vfrKYg7OmSQI9cpERnKfJh6-B1ZluxW-REOj5CJCOm600aTixMnsyPtjkztbay8gpqiA6z1lQvoU"/>
</div>
<div class="aspect-[3/4] rounded-lg bg-surface-container-low overflow-hidden mt-8">
<img class="w-full h-full object-cover" data-alt="premium dark indigo denim jeans textured detail on a minimal background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDCFFFPF3yRqK7AagJRsILsQdwXFBOIh-KgS-zAwnmYeYW1deiV1uqk_g0xqWsLJilin6GP1j3BLhZFLVW69tve1x26d6_eDMsWS83nFuh9L1oFZ5jjL-Dekp7dO7CNFrOhfu7a4v5W4eMtXLEYjqEtAkkJN7uDEhDzfA7DOT2NUzitiC36zgFsjwmMbLeeoAUVK53joji06BXUJamLK5H-VymNzZmP1GKWTlB6XbWex0XciuMrKlY_atlEgt9abtFrSpxNisT4DhY"/>
</div>
</section>
</main>
<!-- Voice Processing Overlay -->
<div class="fixed inset-0 z-[100] flex flex-col items-center justify-between bg-stone-950/40 backdrop-blur-3xl p-8">
<!-- Header / Identity -->
<div class="w-full flex justify-center pt-8">
<div class="bg-white/10 backdrop-blur-md px-6 py-2 rounded-full border border-white/10">
<span class="font-headline italic text-white tracking-widest text-lg">ATELIER</span>
</div>
</div>
<!-- Center: Liquid Orb & Waveform -->
<div class="flex flex-col items-center gap-12 w-full max-w-lg">
<div class="relative flex items-center justify-center">
<!-- Outer Glow -->
<div class="absolute w-64 h-64 bg-secondary-fixed/10 rounded-full blur-3xl animate-pulse"></div>
<!-- Main Orb -->
<div class="liquid-orb w-48 h-48 rounded-full flex items-center justify-center border border-white/5">
<!-- Visual Waveform -->
<div class="flex items-end gap-1.5 h-16">
<div class="waveform-bar w-1.5 bg-secondary-fixed rounded-full" style="animation-delay: 0.1s"></div>
<div class="waveform-bar w-1.5 bg-secondary-fixed rounded-full" style="animation-delay: 0.3s"></div>
<div class="waveform-bar w-1.5 bg-secondary-fixed rounded-full" style="animation-delay: 0.2s"></div>
<div class="waveform-bar w-1.5 bg-secondary-fixed rounded-full" style="animation-delay: 0.5s"></div>
<div class="waveform-bar w-1.5 bg-secondary-fixed rounded-full" style="animation-delay: 0.4s"></div>
</div>
</div>
</div>
<!-- Transcribed Text -->
<div class="text-center px-4 space-y-4">
<h2 class="font-headline text-3xl md:text-4xl text-white leading-tight tracking-tight">
                    "White linen shirt with <span class="text-secondary-fixed underline underline-offset-8 decoration-1">dark indigo</span>..."
                </h2>
<p class="text-stone-400 font-label tracking-widest uppercase text-[10px]">Listening for your style intent</p>
</div>
</div>
<!-- Footer: Action -->
<div class="w-full max-w-xs pb-12">
<button class="group relative w-full overflow-hidden rounded-xl bg-white/10 backdrop-blur-xl border border-white/20 py-5 transition-all duration-300 hover:bg-white/20 active:scale-95">
<div class="relative z-10 flex items-center justify-center gap-3">
<span class="text-white font-medium tracking-wide">Done</span>
<span class="material-symbols-outlined text-white text-lg" data-icon="check_circle">check_circle</span>
</div>
<!-- Subtle Gradient Shine -->
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
</button>
</div>
</div>
<!-- Background Decorative Elements -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-secondary-fixed/5 rounded-full blur-[120px] pointer-events-none z-10"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-tertiary-fixed-dim/5 rounded-full blur-[120px] pointer-events-none z-10"></div>
</body></html>
